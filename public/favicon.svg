<!-- pbkware favicon: PBK monogram on a developer-themed rounded tile -->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
    <defs>
        <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0f172a"/>
            <stop offset="1" stop-color="#1e293b"/>
        </linearGradient>
        <linearGradient id="letters" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#22d3ee"/>
            <stop offset="1" stop-color="#3b82f6"/>
        </linearGradient>
    </defs>

    <!-- Rounded dark tile -->
    <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#tile)" stroke="#334155" stroke-width="1"/>

    <!-- Subtle terminal prompt chevron motif (developer/software theme) -->
    <path d="M10 18 L18 24 L10 30" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- PBK monogram -->
    <text x="36" y="43" font-family="'Courier New', ui-monospace, 'SF Mono', Consolas, monospace" font-size="24" font-weight="700" font-style="italic" text-anchor="middle" letter-spacing="0.5" fill="url(#letters)">PBK</text>

    <!-- Small accent dot echoing "ware" / cursor -->
    <circle cx="52" cy="48" r="2.2" fill="#22d3ee"/>
</svg>
